# ローカル開発用のサービス定義
# プロジェクトに合わせてサービスを追加してください
#
# 例: DynamoDB Local
#   dynamodb-local:
#     image: amazon/dynamodb-local
#     ports: ["8000:8000"]
#     command: "-jar DynamoDBLocal.jar -sharedDb"
#     volumes:
#       - dynamodb-data:/home/dynamodblocal/data
#
# 例: PostgreSQL
#   postgres:
#     image: postgres:16
#     ports: ["5432:5432"]
#     environment:
#       POSTGRES_DB: app
#       POSTGRES_USER: user
#       POSTGRES_PASSWORD: password
#     volumes:
#       - postgres-data:/var/lib/postgresql/data
#
# 例: Redis
#   redis:
#     image: redis:7-alpine
#     ports: ["6379:6379"]

services: {}

